quarkus.package.type=uber-jar
quarkus.package.output-name=knotenhirn-${project.version}
quarkus.package.jar.add-runner-suffix=false
###
quarkus.log.file.enabled=true
quarkus.log.file.path=knotenhirn.log
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %s%e%n
quarkus.log.file.rotation.max-file-size=1M
quarkus.log.file.rotation.max-backup-index=30
###
quarkus.neo4j.uri=bolt://localhost:7687
quarkus.neo4j.authentication.username=neo4j
quarkus.neo4j.authentication.password=knotenhirn