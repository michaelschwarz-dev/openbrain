version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.23
    container_name: knotenhirn-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/knotenhirn
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "knotenhirn", "RETURN 1" ]
      interval: 10s
      timeout: 5s
      retries: 5